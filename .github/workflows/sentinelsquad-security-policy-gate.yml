name: SentinelSquad Security Policy Baseline Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/sentinelsquad/src/lib/tool-command-policy.ts"
      - "apps/sentinelsquad/scripts/lib/tool-command-policy.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-security-policy-baseline.e2e.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-filesystem-safety.e2e.js"
      - "apps/sentinelsquad/package.json"
      - "apps/sentinelsquad/package-lock.json"
      - ".github/workflows/sentinelsquad-security-policy-gate.yml"
  push:
    branches:
      - main
    paths:
      - "apps/sentinelsquad/src/lib/tool-command-policy.ts"
      - "apps/sentinelsquad/scripts/lib/tool-command-policy.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-security-policy-baseline.e2e.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-filesystem-safety.e2e.js"
      - "apps/sentinelsquad/package.json"
      - "apps/sentinelsquad/package-lock.json"
      - ".github/workflows/sentinelsquad-security-policy-gate.yml"

jobs:
  security-policy-baseline-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/sentinelsquad
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/sentinelsquad/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security policy baseline regression harness
        run: npm run e2e:security-policy
