name: SentinelSquad Provenance Identity Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/sentinelsquad/src/lib/tasks.ts"
      - "apps/sentinelsquad/src/lib/email-ingress.ts"
      - "apps/sentinelsquad/src/app/chat/actions.ts"
      - "apps/sentinelsquad/src/app/issues/[number]/actions.ts"
      - "apps/sentinelsquad/scripts/worker.js"
      - "apps/sentinelsquad/scripts/lib/task-provenance.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-provenance-identity.e2e.js"
      - "apps/sentinelsquad/package.json"
      - "apps/sentinelsquad/package-lock.json"
      - ".github/workflows/sentinelsquad-provenance-identity-gate.yml"
  push:
    branches:
      - main
    paths:
      - "apps/sentinelsquad/src/lib/tasks.ts"
      - "apps/sentinelsquad/src/lib/email-ingress.ts"
      - "apps/sentinelsquad/src/app/chat/actions.ts"
      - "apps/sentinelsquad/src/app/issues/[number]/actions.ts"
      - "apps/sentinelsquad/scripts/worker.js"
      - "apps/sentinelsquad/scripts/lib/task-provenance.js"
      - "apps/sentinelsquad/scripts/e2e/sentinelsquad-provenance-identity.e2e.js"
      - "apps/sentinelsquad/package.json"
      - "apps/sentinelsquad/package-lock.json"
      - ".github/workflows/sentinelsquad-provenance-identity-gate.yml"

jobs:
  provenance-identity-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/sentinelsquad
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/sentinelsquad/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run provenance identity regression harness
        run: npm run e2e:provenance
